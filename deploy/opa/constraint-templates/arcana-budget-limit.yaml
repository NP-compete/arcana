apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: arcana-budget-limit
spec:
  crd:
    spec:
      names:
        kind: ArcanaBudgetLimit
      validation:
        openAPIV3Schema:
          type: object
          properties:
            maxBudgetUSD:
              type: number
              description: "Maximum allowed monthly compute budget in USD"
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package arcana.budgetlimit

        violation[{"msg": msg}] {
          input.review.object.kind == "ArcanaBudget"
          budget := input.review.object.spec.monthlyComputeBudgetUSD
          budget > input.parameters.maxBudgetUSD
          msg := sprintf("monthlyComputeBudgetUSD %v exceeds maximum %v USD", [budget, input.parameters.maxBudgetUSD])
        }
