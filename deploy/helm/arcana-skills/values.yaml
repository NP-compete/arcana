replicaCount: 2

image:
  registry: ""
  repository: localhost/arcana-skills
  tag: dev
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8085

env:
  PORT: "8085"
  POSTGRES_HOST: "postgres.arcana.svc.cluster.local"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis.arcana.svc.cluster.local"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.arcana.svc.cluster.local:4318"

envFromSecrets:
  - arcana-platform-secret

probes:
  liveness: "/healthz"
  readiness: "/readyz"

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m

pdb:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 75
  targetMemory: 80

tls:
  enabled: false
  secretName: arcana-service-tls
  mountPath: /etc/tls
