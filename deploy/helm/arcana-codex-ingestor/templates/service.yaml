apiVersion: v1
kind: Service
metadata:
  name: {{{ include "arcana-codex-ingestor.fullname" . }}}
  labels:
    {{- include "arcana-codex-ingestor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "arcana-codex-ingestor.selectorLabels" . | nindent 4 }}
