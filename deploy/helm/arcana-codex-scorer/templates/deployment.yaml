apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arcana-codex-scorer.fullname" . }}
  labels:
    {{- include "arcana-codex-scorer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "arcana-codex-scorer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arcana-codex-scorer.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "arcana-codex-scorer.serviceAccountName" . }}
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: scorer
          image: {{ include "arcana-codex-scorer.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness | default "/healthz" }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness | default "/readyz" }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- if .Values.tls.enabled }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
      {{- end }}
