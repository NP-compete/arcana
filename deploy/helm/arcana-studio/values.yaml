replicaCount: 2

image:
  registry: ""
  repository: localhost/arcana-studio
  tag: dev
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 3000

env:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.arcana.svc.cluster.local:4318"

probes:
  liveness: "/"
  readiness: "/"

resources:
  requests:
    memory: 32Mi
    cpu: 25m
  limits:
    memory: 64Mi
    cpu: 100m

pdb:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 75
  targetMemory: 80

tls:
  enabled: false
  secretName: arcana-service-tls
  mountPath: /etc/tls
