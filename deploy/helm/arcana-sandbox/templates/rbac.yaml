apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "arcana-sandbox.fullname" . }}
  labels:
    {{- include "arcana-sandbox.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "arcana-sandbox.fullname" . }}
  labels:
    {{- include "arcana-sandbox.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "arcana-sandbox.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "arcana-sandbox.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
