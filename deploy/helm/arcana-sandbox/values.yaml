replicaCount: 2

image:
  registry: ""
  repository: localhost/arcana-sandbox
  tag: dev
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8097

env:
  PORT: "8097"
  OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger.arcana.svc.cluster.local:4318"
  SANDBOX_RUNTIME_CLASS: "arcana-sandbox-dev"
  SANDBOX_NAMESPACE: "arcana"

probes:
  liveness: "/healthz"
  readiness: "/readyz"

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m

pdb:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 75
  targetMemory: 80

tls:
  enabled: false
  secretName: arcana-service-tls
  mountPath: /etc/tls
