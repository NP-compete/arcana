replicaCount: 1

image:
  registry: ""
  repository: arcana-api
  tag: dev
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

env:
  PORT: "8080"
  POSTGRES_HOST: "postgres.arcana.svc.cluster.local"
  REDIS_HOST: "redis.arcana.svc.cluster.local"
  TEMPORAL_HOST: "temporal.arcana.svc.cluster.local"
  MINIO_HOST: "minio.arcana.svc.cluster.local"
  NATS_HOST: "nats.arcana.svc.cluster.local"
  ENGINE_HOST: "arcana-engine.arcana.svc.cluster.local"
  BLUEPRINT_HOST: "arcana-blueprint.arcana.svc.cluster.local"
  ORACLE_HOST: "arcana-oracle.arcana.svc.cluster.local"
  MESH_HOST: "arcana-mesh.arcana.svc.cluster.local"
  MEMORY_HOST: "arcana-memory.arcana.svc.cluster.local"
  CODEX_ROUTER_HOST: "arcana-codex-router.arcana.svc.cluster.local"
  CODEX_INGESTOR_HOST: "arcana-codex-ingestor.arcana.svc.cluster.local"
  CONNECTORS_HOST: "arcana-connectors.arcana.svc.cluster.local"
  GRAPH_HOST: "arcana-graph.arcana.svc.cluster.local"
  TOOLS_HOST: "arcana-tools.arcana.svc.cluster.local"
  SANDBOX_HOST: "arcana-sandbox.arcana.svc.cluster.local"
  FORGE_HOST: "arcana-forge.arcana.svc.cluster.local"
  MODELS_HOST: "arcana-models.arcana.svc.cluster.local"
  WARD_HOST: "arcana-ward.arcana.svc.cluster.local"
  AUDIT_HOST: "arcana-audit.arcana.svc.cluster.local"
  PROBE_HOST: "arcana-probe.arcana.svc.cluster.local"
  ANNOTATE_HOST: "arcana-annotate.arcana.svc.cluster.local"
  SKILLS_HOST: "arcana-skills.arcana.svc.cluster.local"
  SCHEDULER_HOST: "arcana-scheduler.arcana.svc.cluster.local"
  REGISTRY_HOST: "arcana-registry.arcana.svc.cluster.local"
  FINOPS_HOST: "arcana-finops.arcana.svc.cluster.local"
  GITOPS_HOST: "arcana-gitops.arcana.svc.cluster.local"

probes:
  liveness: "/healthz"
  readiness: "/readyz"

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m
