replicaCount: 3

image:
  tag: latest
  pullPolicy: Always

resources:
  requests:
    memory: 256Mi
    cpu: 200m
  limits:
    memory: 512Mi
    cpu: 1000m

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPU: 70
  targetMemory: 75

pdb:
  enabled: true
  minAvailable: 2

env:
  ARCANA_ENV: "production"
  LOG_LEVEL: "warn"
