apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arcana-codex-router.fullname" . }}
  labels:
    {{- include "arcana-codex-router.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "arcana-codex-router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arcana-codex-router.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "arcana-codex-router.serviceAccountName" . }}
      containers:
        - name: router
          image: {{ include "arcana-codex-router.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness | default "/healthz" }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness | default "/readyz" }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
