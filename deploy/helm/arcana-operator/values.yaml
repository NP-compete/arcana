replicaCount: 1

image:
  registry: localhost:5001
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8082

env:
  PORT: "8082"


probes:
  liveness: "/healthz"
  readiness: "/readyz"

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 500m

rbac:
  create: true
