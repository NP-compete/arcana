replicaCount: 2

image:
  registry: ""
  repository: localhost/arcana-mesh
  tag: dev
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8083

env:
  PORT: "8083"
  NATS_URL: "nats://nats.arcana.svc.cluster.local:4222"
  POSTGRES_HOST: "postgres.arcana.svc.cluster.local"
  POSTGRES_PORT: "5432"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.arcana.svc.cluster.local:4318"
  TEMPLATE_AGENT_IMAGE: "ghcr.io/redhat-data-and-ai/template-agent:deep-agent"
  TEMPLATE_AGENT_PULL_POLICY: "Always"

envFromSecrets:
  - arcana-platform-secret

probes:
  liveness: "/healthz"
  readiness: "/readyz"

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 250m

pdb:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 75
  targetMemory: 80

tls:
  enabled: false
  secretName: arcana-service-tls
  mountPath: /etc/tls
