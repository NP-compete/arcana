apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arcana-mesh-agent-manager
  labels:
    {{- include "arcana-mesh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: arcana-mesh-agent-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "arcana-mesh.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
