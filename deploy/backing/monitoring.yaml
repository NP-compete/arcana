apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: arcana
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - "/etc/prometheus/alerts.yml"
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager:9093"
    scrape_configs:
      - job_name: 'arcana-services'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - arcana
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_part_of]
            regex: arcana
            action: keep
          - source_labels: [__meta_kubernetes_endpoints_name]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
      - job_name: 'arcana-api'
        static_configs:
          - targets: ['arcana-api:8080']
      - job_name: 'arcana-mesh'
        static_configs:
          - targets: ['arcana-mesh:8081']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: arcana
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: alert-rules
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alert-rules
          configMap:
            name: prometheus-alert-rules
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: arcana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: arcana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: arcana
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: arcana
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: http
