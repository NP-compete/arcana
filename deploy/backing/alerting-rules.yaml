apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: arcana
  labels:
    app.kubernetes.io/part-of: arcana
data:
  alerts.yml: |
    groups:
      - name: arcana-availability
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} has been unreachable for 2 minutes."

          - alert: HighErrorRate
            expr: rate(arcana_http_requests_total{status=~"5.."}[5m]) / rate(arcana_http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "Error rate exceeds 5% for 5 minutes on {{ $labels.service }}."

          - alert: HighLatencyP95
            expr: histogram_quantile(0.95, rate(arcana_http_request_duration_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service }}"
              description: "p95 latency exceeds 2s for 5 minutes."

          - alert: HighLatencyP99
            expr: histogram_quantile(0.99, rate(arcana_http_request_duration_seconds_bucket[5m])) > 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Critical p99 latency on {{ $labels.service }}"
              description: "p99 latency exceeds 5s for 5 minutes."

      - name: arcana-resources
        rules:
          - alert: PodRestarting
            expr: increase(kube_pod_container_status_restarts_total{namespace="arcana"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} restarting frequently"
              description: "{{ $labels.pod }} has restarted {{ $value }} times in the last hour."

          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{namespace="arcana", reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} OOMKilled"
              description: "Container {{ $labels.container }} in {{ $labels.pod }} was OOMKilled."

          - alert: HighMemoryUsage
            expr: container_memory_working_set_bytes{namespace="arcana"} / container_spec_memory_limit_bytes{namespace="arcana"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.pod }}"
              description: "Memory usage exceeds 85% of limit."

          - alert: HighCPUThrottling
            expr: rate(container_cpu_cfs_throttled_periods_total{namespace="arcana"}[5m]) / rate(container_cpu_cfs_periods_total{namespace="arcana"}[5m]) > 0.25
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU throttling on {{ $labels.pod }}"
              description: "CPU throttling exceeds 25% for 5 minutes."

      - name: arcana-business
        rules:
          - alert: AuthFailureSpike
            expr: rate(arcana_auth_failures_total[5m]) > 10
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Authentication failure spike"
              description: "More than 10 auth failures/second for 2 minutes."

          - alert: RateLimitHitSpike
            expr: rate(arcana_rate_limit_hits_total[5m]) > 50
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Rate limit hit spike"
              description: "Rate limiting triggered >50/second for 2 minutes."

          - alert: DatabaseSlowQueries
            expr: histogram_quantile(0.95, rate(arcana_db_query_duration_seconds_bucket[5m])) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Slow database queries"
              description: "p95 DB query duration exceeds 1 second."

      - name: arcana-infrastructure
        rules:
          - alert: PostgresDown
            expr: pg_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"

          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis is down"

          - alert: PVCNearFull
            expr: kubelet_volume_stats_used_bytes{namespace="arcana"} / kubelet_volume_stats_capacity_bytes{namespace="arcana"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} near full"
              description: "PVC usage exceeds 85%."

          - alert: CertificateExpiringSoon
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Certificate expiring soon"
              description: "Certificate {{ $labels.name }} expires in less than 7 days."
