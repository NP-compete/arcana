apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: arcana
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE DATABASE arcana_skills;
    CREATE DATABASE arcana_temporal;
    CREATE DATABASE arcana_temporal_visibility;
    GRANT ALL PRIVILEGES ON DATABASE arcana_skills TO arcana;
    GRANT ALL PRIVILEGES ON DATABASE arcana_temporal TO arcana;
    GRANT ALL PRIVILEGES ON DATABASE arcana_temporal_visibility TO arcana;
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: arcana
type: Opaque
stringData:
  POSTGRES_USER: arcana
  POSTGRES_PASSWORD: arcana-dev
  POSTGRES_DB: arcana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: arcana
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
              name: pg
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "arcana"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: arcana
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: pg
