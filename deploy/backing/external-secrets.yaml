# =============================================================================
# External Secrets Operator — Production Secret Management
#
# Prerequisites:
#   1. Install ESO: helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#   2. Configure a SecretStore backend (Vault, AWS, GCP, Azure)
#   3. Populate secrets in the backend under the path "arcana/platform"
#
# See docs/secrets-management.md for setup instructions.
# =============================================================================

# --- SecretStore: HashiCorp Vault (default) ---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: arcana-vault
  namespace: arcana
spec:
  provider:
    vault:
      # REQUIRED: Replace with your Vault server URL before deploying.
      # Examples:
      #   - Self-hosted: "https://vault.internal.mycompany.com"
      #   - HCP Vault:   "https://vault-cluster.vault.xxxxxxxx.aws.hashicorp.cloud:8200"
      #   - Dev/local:   "http://vault.vault.svc.cluster.local:8200"
      #
      # For alternative backends (AWS Secrets Manager, GCP Secret Manager, Azure Key Vault),
      # uncomment the corresponding SecretStore block below and comment out this Vault block.
      server: "https://{{ VAULT_ADDR }}"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "arcana"
          serviceAccountRef:
            name: "arcana-vault-auth"
---
# --- SecretStore: AWS Secrets Manager (alternative) ---
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: arcana-aws-sm
#   namespace: arcana
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: "arcana-aws-auth"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arcana-platform-secret
  namespace: arcana
  labels:
    app.kubernetes.io/part-of: arcana
    environment: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: arcana-vault
    kind: SecretStore
  target:
    name: arcana-platform-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: arcana/platform
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: arcana/platform
        property: postgres_password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: arcana/platform
        property: postgres_db
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: arcana/platform
        property: minio_root_user
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: arcana/platform
        property: minio_root_password
    - secretKey: JWT_SIGNING_KEY
      remoteRef:
        key: arcana/platform
        property: jwt_signing_key
    - secretKey: AUDIT_HMAC_KEY
      remoteRef:
        key: arcana/platform
        property: audit_hmac_key
    - secretKey: ADMIN_API_KEY
      remoteRef:
        key: arcana/platform
        property: admin_api_key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: arcana/platform
        property: encryption_key
