apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-dynconfig
  namespace: arcana
data:
  development.yaml: |
    system.forceSearchAttributesCacheRefreshOnRead:
      - value: true
        constraints: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: arcana
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/part-of: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres.arcana.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.25
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: arcana
            - name: POSTGRES_PWD
              value: arcana-dev
            - name: POSTGRES_SEEDS
              value: postgres.arcana.svc.cluster.local
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: /etc/temporal/config/dynamicconfig/development.yaml
          ports:
            - containerPort: 7233
              name: grpc
          volumeMounts:
            - name: dynconfig
              mountPath: /etc/temporal/config/dynamicconfig
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: 1000m
      volumes:
        - name: dynconfig
          configMap:
            name: temporal-dynconfig
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: arcana
spec:
  selector:
    app.kubernetes.io/name: temporal
  ports:
    - port: 7233
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: arcana
  labels:
    app.kubernetes.io/name: temporal-ui
    app.kubernetes.io/part-of: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: temporalio/ui:latest
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal.arcana.svc.cluster.local:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:3000
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: arcana
spec:
  selector:
    app.kubernetes.io/name: temporal-ui
  ports:
    - port: 8233
      targetPort: http
