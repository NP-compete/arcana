apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arcana-ingress
  namespace: arcana
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: arcana.localhost.me
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: arcana-api
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: arcana-api
                port:
                  number: 8080
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: arcana-agui
                port:
                  number: 8084
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arcana-studio
                port:
                  number: 3000
