apiVersion: batch/v1
kind: CronJob
metadata:
  name: arcana-db-backup
  namespace: arcana
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/part-of: arcana
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/arcana_${TIMESTAMP}.sql.gz"
                  echo "Starting backup at ${TIMESTAMP}"
                  pg_dumpall -h postgres -U arcana | gzip > "${BACKUP_FILE}"
                  echo "Backup saved to ${BACKUP_FILE}"
                  ls -lh /backups/
                  KEEP=7
                  cd /backups && ls -t *.sql.gz | tail -n +$((KEEP+1)) | xargs -r rm -v
                  echo "Cleanup complete — kept last ${KEEP} backups"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  memory: 64Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
                  cpu: 200m
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backup-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-data
  namespace: arcana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
