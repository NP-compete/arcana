apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: arcana
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
    spec:
      containers:
        - name: nats
          image: nats:2-alpine
          args: ["-js", "-m", "8222"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: arcana
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - port: 4222
      targetPort: client
      name: client
    - port: 8222
      targetPort: monitor
      name: monitor
