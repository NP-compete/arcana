apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: arcana
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-arcana-egress
  namespace: arcana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: arcana
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arcana
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-llm-egress
  namespace: arcana
  annotations:
    description: "Allow engine and forge to reach external LLM APIs (HTTPS only)"
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - arcana-engine
          - arcana-forge
          - arcana-models
          - arcana-skills
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
