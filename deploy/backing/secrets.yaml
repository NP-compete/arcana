# =============================================================================
# DEV ONLY — Do NOT use in production.
# Production environments must use External Secrets Operator (see external-secrets.yaml)
# or inject secrets via a secrets manager (HashiCorp Vault, AWS Secrets Manager, etc.)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: arcana-platform-secret
  namespace: arcana
  labels:
    app.kubernetes.io/part-of: arcana
    environment: development
type: Opaque
stringData:
  POSTGRES_USER: arcana
  POSTGRES_PASSWORD: arcana-dev
  POSTGRES_DB: arcana
  MINIO_ROOT_USER: arcana
  MINIO_ROOT_PASSWORD: arcana-dev
  JWT_SIGNING_KEY: arcana-jwt-signing-key-change-in-production
  AUDIT_HMAC_KEY: arcana-audit-hmac-key-change-in-production
  ADMIN_API_KEY: ak-admin-arcana-default-key
  ENCRYPTION_KEY: arcana-encryption-key-32bytes!!
