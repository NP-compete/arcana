apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: arcana
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-arcana-internal
  namespace: arcana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: arcana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: arcana
      ports:
        # Go services (8080-8106)
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8085
        - protocol: TCP
          port: 8086
        - protocol: TCP
          port: 8087
        - protocol: TCP
          port: 8088
        - protocol: TCP
          port: 8089
        - protocol: TCP
          port: 8090
        - protocol: TCP
          port: 8091
        - protocol: TCP
          port: 8092
        - protocol: TCP
          port: 8093
        - protocol: TCP
          port: 8094
        - protocol: TCP
          port: 8095
        - protocol: TCP
          port: 8096
        - protocol: TCP
          port: 8097
        - protocol: TCP
          port: 8098
        - protocol: TCP
          port: 8099
        - protocol: TCP
          port: 8100
        - protocol: TCP
          port: 8101
        - protocol: TCP
          port: 8102
        - protocol: TCP
          port: 8103
        - protocol: TCP
          port: 8104
        - protocol: TCP
          port: 8105
        - protocol: TCP
          port: 8106
        # Backing services
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 7233
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9093
        - protocol: TCP
          port: 3000
        # OTEL/Jaeger
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 16686
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: arcana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: arcana-api
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-studio
  namespace: arcana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: arcana-studio
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 3000
