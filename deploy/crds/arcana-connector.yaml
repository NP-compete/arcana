apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanaconnectors.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaConnector
    listKind: ArcanaConnectorList
    plural: arcanaconnectors
    singular: arcanaconnector
    shortNames:
      - acn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                type:
                  type: string
                  enum: ["gdrive", "confluence", "slack", "notion", "github", "gitlab", "jira", "s3", "postgres", "mysql", "snowflake", "email", "web", "file"]
                schedule:
                  type: string
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                secretRef:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                lastSync:
                  type: string
                  format: date-time
                documentsSynced:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Docs
          type: integer
          jsonPath: .status.documentsSynced
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
