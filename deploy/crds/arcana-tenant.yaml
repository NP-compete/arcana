apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanatenants.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaTenant
    listKind: ArcanaTenantList
    plural: arcanatenants
    singular: arcanatenant
    shortNames:
      - aten
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                displayName:
                  type: string
                namespaces:
                  type: array
                  items:
                    type: string
                quotas:
                  type: object
                  properties:
                    maxAgents:
                      type: integer
                    maxGpuHours:
                      type: integer
                    maxTokensPerMonth:
                      type: integer
            status:
              type: object
              properties:
                phase:
                  type: string
                activeAgents:
                  type: integer
      subresources:
        status: {}
