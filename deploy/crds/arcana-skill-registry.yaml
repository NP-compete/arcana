apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanaskillregistries.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaSkillRegistry
    listKind: ArcanaSkillRegistryList
    plural: arcanaskillregistries
    singular: arcanaskillregistry
    shortNames:
      - askr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                skills:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      tier:
                        type: string
                        enum: ["planning", "functional", "atomic"]
                      version:
                        type: string
                      qualityBadge:
                        type: string
                        enum: ["gold", "silver", "bronze", "untested", "failed"]
            status:
              type: object
              properties:
                totalSkills:
                  type: integer
                lastSyncTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
