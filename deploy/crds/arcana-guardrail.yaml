apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanaguardrails.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaGuardrail
    listKind: ArcanaGuardrailList
    plural: arcanaguardrails
    singular: arcanaguardrail
    shortNames:
      - agr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: ["schema", "policy", "rate_limit", "pattern", "semantic", "risk_chain"]
                pattern:
                  type: string
                action:
                  type: string
                  enum: ["block", "warn", "redact", "allow"]
                severity:
                  type: string
                  enum: ["critical", "high", "medium", "low"]
                scope:
                  type: object
                  properties:
                    agents:
                      type: array
                      items:
                        type: string
                    tenants:
                      type: array
                      items:
                        type: string
            status:
              type: object
              properties:
                active:
                  type: boolean
                triggeredCount:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Action
          type: string
          jsonPath: .spec.action
        - name: Active
          type: boolean
          jsonPath: .status.active
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
