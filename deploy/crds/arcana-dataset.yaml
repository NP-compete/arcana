apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanadatasets.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaDataset
    listKind: ArcanaDatasetList
    plural: arcanadatasets
    singular: arcanadataset
    shortNames:
      - ads
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                format:
                  type: string
                  enum: ["jsonl", "parquet", "csv", "arrow"]
                source:
                  type: string
                size:
                  type: integer
                schema:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                rowCount:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Format
          type: string
          jsonPath: .spec.format
        - name: Rows
          type: integer
          jsonPath: .status.rowCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
