apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanaplatforms.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaPlatform
    listKind: ArcanaPlatformList
    plural: arcanaplatforms
    singular: arcanaplatform
    shortNames:
      - apf
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version:
                  type: string
                planes:
                  type: object
                  properties:
                    interact:
                      type: boolean
                    agent:
                      type: boolean
                    data:
                      type: boolean
                    tool:
                      type: boolean
                    model:
                      type: boolean
                    govern:
                      type: boolean
                    quality:
                      type: boolean
                    ops:
                      type: boolean
                highAvailability:
                  type: boolean
                backupEnabled:
                  type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                servicesReady:
                  type: integer
                servicesTotal:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Ready
          type: string
          jsonPath: .status.servicesReady
        - name: Total
          type: string
          jsonPath: .status.servicesTotal
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
