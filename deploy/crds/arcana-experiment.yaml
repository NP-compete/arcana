apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanaexperiments.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaExperiment
    listKind: ArcanaExperimentList
    plural: arcanaexperiments
    singular: arcanaexperiment
    shortNames:
      - aexp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                baseModel:
                  type: string
                method:
                  type: string
                  enum: ["lora", "qlora", "full", "dpo"]
                dataset:
                  type: string
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                progress:
                  type: integer
                metrics:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Method
          type: string
          jsonPath: .spec.method
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Progress
          type: integer
          jsonPath: .status.progress
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
