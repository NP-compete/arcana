apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arcanaagents.arcana.io
spec:
  group: arcana.io
  names:
    kind: ArcanaAgent
    listKind: ArcanaAgentList
    plural: arcanaagents
    singular: arcanaagent
    shortNames:
      - aag
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                model:
                  type: string
                  description: "Default LLM model identifier"
                skills:
                  type: array
                  items:
                    type: string
                  description: "List of skill names from the SkillRegistry"
                memory:
                  type: object
                  properties:
                    backend:
                      type: string
                      enum: ["pgvector", "redis"]
                    ttl:
                      type: string
                budget:
                  type: object
                  properties:
                    maxTokensPerTurn:
                      type: integer
                    routingStrategy:
                      type: string
                      enum: ["baar", "seqroute", "fixed"]
                sandbox:
                  type: object
                  properties:
                    runtime:
                      type: string
                      enum: ["gvisor", "kata", "none"]
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
